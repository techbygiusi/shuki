version: '3.8'
services:
  shuki-server:
    build: .
    container_name: shuki-server
    ports:
      - "3000:3000"
    volumes:
      - shuki-data:/data
    environment:
      - PORT=3000
      - DATA_PATH=/data
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
volumes:
  shuki-data:
    driver: local
