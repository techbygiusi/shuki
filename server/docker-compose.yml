version: '3.8'
services:
  shuki-server:
    build:
      context: https://github.com/techbygiusi/shuki.git#main
      dockerfile: server/Dockerfile
    container_name: shuki-server
    ports:
      - "3000:3000"
    volumes:
      - shuki-data:/data
    environment:
      - PORT=3000
      - DATA_PATH=/data
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  shuki-data:
    driver: local
